<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>
    <!-- tailwined disind with daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- fabicon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- universel style  -->
    <style>
        * {

            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">
    <nav class="border-b-2 border-gray-300">
        <div class="w-11/12 mx-auto flex justify-between py-3 items-center">
            <div class="flex">
                <div class="w-[60px]">
                    <img src="./assets/logo.png" alt="">

                </div>
                <div>
                    <p class="font-bold text-2xl">$<span id="amount">45000</span></p>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div>
                <a href="./index.html" class="btn btn- text-neutral/50 gap-1 rounded-xl">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>Logout
                </a>

            </div>
        </div>


    </nav>
    <main>
        <section class="mt-8 w-11/12 mx-auto mb-6">
            <h2 class="font-bold text-2xl mb-2">Welcome to Pay<span class="text-primary">oo</span></h2>
            <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and
            </p>
        </section>
        <section class="w-11/12 mx-auto grid grid-cols-3 gap-4">
            <button class="btn flex-col py-12 rounded-xl btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button class="btn flex-col py-12 rounded-xl btn-primary btn-soft">
                <img src="./assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button class="btn flex-col py-12 rounded-xl btn-primary btn-soft">
                <img src="./assets/opt-3.png" alt="">
                <p>Transfer Money</p>
            </button>
            <button class="btn flex-col py-12 rounded-xl btn-primary btn-soft">
                <img src="./assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button class="btn flex-col py-12 rounded-xl btn-primary btn-soft">
                <img src="./assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button class="btn flex-col py-12 rounded-xl btn-primary btn-soft">
                <img src="./assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </section>
        <section class="w-11/12 mx-auto">
            <div>
                <h2 class="font-semibold text-[18px] p-3 ">Cash out</h2>
            </div>
            <div>
                <div class="card bg-base-100  rounded-2xl mx-auto w-full max-w-sm shrink-0 shadow">
                    <div class="card-body">
                        <fieldset class="fieldset">
                            <label class="label font-bold text-neutral">Agent Number</label>
                            <input type="text" id="agent-number" maxlength="11" minlength="11"
                                class="input rounded-full bg-[#F4F5F7] w-full" placeholder="Enter 11 digit number" />
                            <label class="label font-bold text-neutral">Amount</label>
                            <input type="number" id="amount-withdraw"
                                class="input rounded-full bg-[#F4F5F7] w-full" placeholder="Enter amount to withdraw" />
                            <label class="label font-bold text-neutral ">4 Digit Pin</label>
                            <input type="password" id="withdraw-pin" maxlength="4" minlength="4"
                                class="input bg-[#F4F5F7] rounded-full w-full" placeholder="Enter 4 Digit Pin" />
                            <div></div>
                            <button id="Cashout-btn" class="btn btn-primary rounded-full mt-4">Withdraw Money</button>
                        </fieldset>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="./script/cashout.js"></script>
</body>

</html>
